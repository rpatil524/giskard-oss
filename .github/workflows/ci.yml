name: Main CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: make install install-tools
      - run: make check

  test-unit:
    name: test-unit / ${{ matrix.package }} / ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        package: [giskard-core, giskard-llm, giskard-agents, giskard-checks, giskard-scan]
    env:
      PACKAGE: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: make install
      - run: make test-unit PACKAGE=$PACKAGE

  test-minimal:
    name: test-minimal / ${{ matrix.package }}
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [giskard-llm, giskard-agents, giskard-checks]
    env:
      PACKAGE: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: make install-minimal
      - run: make test-unit-minimal PACKAGE=$PACKAGE

  test-no-providers:
    name: test-no-providers / giskard-llm
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: make install-no-providers
      - run: make test-no-providers
